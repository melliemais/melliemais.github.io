<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            display: grid;
            grid-template-columns: auto auto auto auto auto auto;
            padding: 1rem;
            width: 100%;
            justify-content: center;
        }
        #cell{
            text-align: center;
            width: 4rem;
            border: 0.1rem solid white;
            font: 1rem "Comic Sans MS", sans-serif;
        }
        h1, p, footer{
            font: 1rem "Comic Sans MS", sans-serif;
        }
    </style>
</head>
<body>
    <h1> Numbers 0-100</h1>
    <p> Precedence: Red if prime, yellow if odd, green if even</p>
    <div id="container">
    </div>
    
</body>
<script>
    let div = document.getElementById("container");
    let number = 0;
    let timer = setInterval(resetInterval, 500,number);
    let primes = [2];
    function addNumber(num){
        number++;
        let numberNode = document.createElement("div");
        numberNode.id = "cell";
        numberNode.innerText = num;
        if (num > 2){
            let isPrime = primeGenerator(num);
        }
        if (num % 2 == 0){
            numberNode.style.backgroundColor = "green";
        }else{
            numberNode.style.backgroundColor = "yellow";
        }
        if (primes.includes(num)){
            numberNode.style.backgroundColor = "red";
        }
        div.appendChild(numberNode);
    }
    function resetInterval(){
        addNumber(number);
        clearInterval(timer);
        let timer = setinterval(resetInterval, 500);
    }
    function primeGenerator(num){
        for (let p of primes){
            if (num % p == 0){
                return false;
            }
        }
        primes.push(num);
        return true;
    }
</script>
<footer>
    <a href="projects.html">Back to Project Portal</a>
</footer>
</html>
