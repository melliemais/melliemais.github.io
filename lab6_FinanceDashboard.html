<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Lab 6: Personal Finance Dashboard</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <form id="finance" type="get">
            <div class="mb-3">
                <h1>Add Income</h1>
                <label class="form-label" for="sourceName">Income Source Name:</label>
                <input class="form-control" required type="text" minLength=3 name="sourceName" id="name">
                <label class="form-label" for="amount">Amount:</label>
                <input class="form-control" required type="number" min="0" step="0.01" name="amount" id="amt">
                <label class="form-label" for="frequency">Frequency:</label>
                <select class="form-select" name="frequency" id="fq">
                    <option value="Daily">One-time</option>
                    <option value="Weekly">Weekly</option>
                    <option value="Biweekly">Biweekly</option>
                    <option value="Monthly">Monthly</option>
                    <option value="Annually">Annually</option>
                </select><br>
                <input class="btn btn-primary" type="submit">
            </div>
        </form>
        <script>
            document.getElementById("finance").addEventListener("submit", function (e) {
            e.preventDefault(); // Stop the form from submitting automatically
    
            // Get form values
            const name = document.getElementById("name").value;
            const amt = document.getElementById("amt").value;
            const fq = document.getElementById("fq").value;
    
            // Log to console (or do whatever you need with the data)
            console.log("Form submitted successfully!");
            console.log("Income source name:", name);
            console.log("Amount:", amt.toFixed());
            console.log("Frequency:", fq);
            });
        </script>
    </body>
    <footer>
        <a href="projects.html">Back to Project Portal</a>
    </footer>
</html>
