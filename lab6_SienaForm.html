<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Lab 6: Siena Form</title>
    </head>
    <body>
        <form id="sienaForm" method="get">
            <label for="emailAddress">Siena College Email: </label>
            <input type="email" name="email" id="emailAddress" 
            placeholder="Enter your Siena email" required pattern=".+@siena.edu">
            <label for="sienaID">Siena ID: </label>
            <input type="number" name="name" id="sienaID"  
            placeholder="Enter your Siena ID" required min="90200000" max="902999999">
            <input type="submit" value="Submit">
        </form>
        <script src="lab6Script.js" defer></script>
    </body>
</html>
