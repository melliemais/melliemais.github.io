<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="proj3_style.css">
    <title>Cumulative Cumulation</title>
</head>

<body>
    <h1>Cumulative Cumulation</h1>
    <h2>
        <div id="number">0</div>
    </h2>
    <h3>
        <span id="velocity">+0 / sec</span>
        <span id="click">+1 / click</span>
    </h3>
    <div id="news" class="container">You have a feeling that you're missing something.</div>
    <button id="tab-producers" onClick="show('producers')">Producers</button>
    <button id="tab-producers" onClick="show('options')">Options</button>
    <button id="tab-producers" onClick="show('stats')">Stats</button><br>
    <div id="producers" class="tab">

        <button id="increment-btn" tabindex="-1">Increment</button><br>


        <h3 id="incrementors">Incrementors<br></h3>

        <h3 id="clickers">Clickers<br></h3>

        
    </div>
    <div id="options" class="tab">

        <button id="export-btn">Export</button>
        <h4> Export File: </h4>
        <textarea id="export-result" cols="40" rows="10" readonly> </textarea> <br>
        
        <h4> Import File: </h4>
        <textarea id="import-area" cols="40" rows="10"></textarea> <br>
        <button id="import-btn">Import</button><br>

        <button id="reset-btn" class="reset">Reset</button>
        
    </div>

    <div id="stats" class="tab">

        <br>
        <div id="totalNumber">Total number:</div>
        
        
        <div id="clickProd">Total number from clicks:</div>
        <div id="incProd">Total number from production:</div><br>

        <div id="clicks">Total clicks:</div>

        <div id="duration">Time since inception:</div>
        
    </div>

</body>
<script>
    let tabs = ['producers', 'stats', 'options'];
    show('producers');
    function show(element){
        for (let t of tabs){
            hide(t);
        }
        document.getElementById(element).style.display = "inline";
    }
    function hide(element){
        document.getElementById(element).style.display = "none";
    }
</script>
<script src="proj3_main.js"></script>
<footer>
    <br><a href="projects.html">Back to Project Portal</a>
</footer>

</html>
