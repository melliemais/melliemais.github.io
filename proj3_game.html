<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="proj3_style.css">
    <title>Cumulative Cumulation</title>
</head>

<body>
    <h1>Cumulative Cumulation</h1>
    <h2>
        <div id="number">0</div>
    </h2>
    <h3>
        <span id="velocity">+0 / sec</span>
        <span id="click">+1 / click</span>
    </h3>
    <div id="news" class="container">You have a feeling that you're missing something.</div>
    <button id="increment-btn" tabindex="-1">Increment</button><br>

    <button id="reset-btn">Reset</button>
    <button id="export-btn">Export</button>
    <button id="import-btn">Import</button><br>

    <h3>Incrementors</h3>
    <div>
        <button id="basicIncrementor-btn" class="inc">Basic
            <div id="basicIncrementor-cost">Cost:</div>
            <div id="basicIncrementor-quantity">Owned: 0</div>
            <div id="basicIncrementor-production">+1 / sec</div>
        </button>
        <button id="stdIncrementor-btn" class="inc">Standard
            <div id="stdIncrementor-cost">Cost:</div>
            <div id="stdIncrementor-quantity">Owned: 0</div>
            <div id="stdIncrementor-production">+5 / sec</div>
        </button>
        <button id="intIncrementor-btn" class="inc">Intermediate
            <div id="intIncrementor-cost">Cost:</div>
            <div id="intIncrementor-quantity">Owned: 0</div>
            <div id="intIncrementor-production">+25 / sec</div>
        </button>
        <button id="advIncrementor-btn" class="inc">Advanced
            <div id="advIncrementor-cost">Cost:</div>
            <div id="advIncrementor-quantity">Owned: 0</div>
            <div id="advIncrementor-production">+125 / sec</div>
        </button>
        <button id="expIncrementor-btn" class="inc">Expert
            <div id="expIncrementor-cost">Cost:</div>
            <div id="expIncrementor-quantity">Owned: 0</div>
            <div id="expIncrementor-production">+625 / sec</div>
        </button>
        <button id="masIncrementor-btn" class="inc">Master
            <div id="masIncrementor-cost">Cost:</div>
            <div id="masIncrementor-quantity">Owned: 0</div>
            <div id="masIncrementor-production">+3125 / sec</div>
        </button>

    </div>
    <h3>Clickers</h3>
    <div>
        <button id="basicClicker-btn" class="cli">Basic
            <div id="basicClicker-cost">Cost: 9</div>
            <div id="basicClicker-quantity">Owned: 0</div>
            <div id="basicClicker-production">+1 / click</div>
        </button>
        <button id="stdClicker-btn" class="cli">Standard
            <div id="stdClicker-cost">Cost: 81</div>
            <div id="stdClicker-quantity">Owned: 0</div>
            <div id="stdClicker-production">+5 / click</div>
        </button>
        <button id="intClicker-btn" class="cli">Intermediate
            <div id="intClicker-cost">Cost: 729</div>
            <div id="intClicker-quantity">Owned: 0</div>
            <div id="intClicker-production">+25 / click</div>
        </button>
        <button id="advClicker-btn" class="cli">Advanced
            <div id="advClicker-cost">Cost: 6561</div>
            <div id="advClicker-quantity">Owned: 0</div>
            <div id="advClicker-production">+125 / click</div>
        </button>
        <button id="expClicker-btn" class="cli">Expert
            <div id="expClicker-cost">Cost: 59049</div>
            <div id="expClicker-quantity">Owned: 0</div>
            <div id="expClicker-production">+625 / click</div>
        </button>
        <button id="masClicker-btn" class="cli">Master
            <div id="masClicker-cost">Cost: 531441</div>
            <div id="masClicker-quantity">Owned: 0</div>
            <div id="masClicker-production">+3125 / click</div>
        </button>
    </div>

</body>
<script src="proj3_main.js"></script>
<footer>
    <br><a href="projects.html">Back to Project Portal</a>
</footer>

</html>
