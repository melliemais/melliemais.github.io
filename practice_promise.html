<script>
    function finishPromise(resolve){

    function waitThenResolve(resolve){

    function handleResult(resolve){
        console.log("handled");
    }
    function createPromise(resolve){
        return new Promise(function(resolve, reject){
            setTimeout(handleResult, 0, resolve);
        })
    }
    let a = createPromise();
    a.then(handleResult);

    function orderExecutor(resolve, reject) {
        console.log("1");
        setTimeout(function () {
            resolve("2");
        }, 10000);
        setTimeout(function(){
            reject("no");
        }, 2000);
    }

    let p1 = new Promise(orderExecutor);
    p1.then(console.log)
    .catch(console.log);
    console.log("3");
</script>
