<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fetch Lab</title>
 
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light">
  <main class="container py-4">
    <h1 class="mb-4">Fetch Lab</h1>
 
    <section id="hello-section" class="card mb-4">
      <div class="card-body">
        <h2 class="h4">1. Hello (text response)</h2>
        <button id="hello-btn" class="btn btn-primary">Fetch /hello</button>
        <div id="hello-result" class="alert alert-secondary mt-3 mb-0" role="alert">
          Click the button...
        </div>
        <input id="name-input">
        <button id="greet-btn" class="btn btn-primary">Greet</button>
      </div>
    </section>
    <!-- You will add more sections below -->
    <script>

        // D.1 

        // Put this near the top of your <script> tag
        function statusCheck(response) {
        if (response.ok) return response;
        // Try to read JSON error bodies like { error: "..." }
         return response.json()
            .then(errData => {
            const msg = errData.error || ('HTTP ' + response.status);
            throw new Error(msg);
            })
            .catch(() => {
            // If the response wasn’t JSON, fall back to a generic message
            throw new Error('HTTP ' + response.status);
            });
        }

        document.getElementById('hello-btn')
        .addEventListener('click', () => {
            fetch('/hello')
            .then(statusCheck)
            .then(response => response.text())
            .then(text => {
                document.getElementById('hello-result').textContent = text;
            })
            .catch(error => {
                document.getElementById('hello-result').textContent = 'Error: ' + error.message;
            });
        });

        // D.3

        const name = document.getElementById('name-input').value;
        fetch('/api/greet/' + name)
        .then(statusCheck)
        .then(response => response.json())
        .then(data => { /* display data.greeting */ })
        .catch(error => { /* handle error */ });

      // Your fetch code goes here
    </script>
  </main>
</body>
</html>
